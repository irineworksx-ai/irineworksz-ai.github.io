<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irine Sanorjo | Technical Support VA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff; /* White text for contrast */
            --accent: #34d399;  /* Emerald Green accent to match the dark green background */
            --text-main: #f8fafc; /* Near white for main text */
            --text-light: #cbd5e1; /* Lighter grey for descriptions */
            
            /* Transparent Backgrounds */
            --glass-bg: rgba(15, 23, 42, 0.65); /* Dark transparent glass effect */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        
        /* 1. Use cover.jpg as the full page background */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            color: var(--text-main); 
            line-height: 1.6; 
            
            /* Apply cover.jpg to the whole page */
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), /* Semi-dark overlay */
                        url('cover.jpg'); /* Your uploaded cover.jpg */
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; /* Keeps the background static while scrolling */
        }

        /* 2. Transparent Nav */
        nav {
            position: sticky; top: 0; 
            background: var(--glass-bg); /* Use the glass effect */
            backdrop-filter: blur(12px); /* Creates the blurry transparent look */
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); text-decoration: none; }
        .nav-links a { text-decoration: none; color: var(--text-light); margin-left: 20px; font-weight: 500; font-size: 0.9rem; }
        .nav-links a:hover { color: var(--accent); }

        /* HERO SECTION - Now part of the full background */
        .hero {
            padding: 120px 20px 60px;
            text-align: center; color: var(--white);
            /* Removed the separate hero background */
        }
        .profile-pic {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid var(--accent); margin-bottom: 20px; object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .hero h1 { color: var(--primary); }

        section { padding: 60px 5%; max-width: 1100px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { font-size: 2.2rem; color: var(--primary); }
        .section-title p { color: var(--text-light); }
        
        /* 3. Transparent Info & Service Cards */
        .info-card, .service-card, .contact-card {
            background: var(--glass-bg); /* Transparent glass background */
            backdrop-filter: blur(8px);
            padding: 40px; border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            margin-bottom: 40px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
